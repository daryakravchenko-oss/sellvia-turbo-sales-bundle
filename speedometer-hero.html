<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Revenue Speedometer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; font-family: 'Inter', -apple-system, sans-serif; }
  #stage { position: absolute; left: 50%; top: 50%; width: 940px; height: 540px; transform-origin: center center; }

  .card {
    position: relative; width: 100%; height: 100%; display: flex; align-items: center; gap: 36px;
    padding: 44px 52px; background: radial-gradient(120% 120% at 28% 18%, #15101f 0%, #0a0712 55%, #060409 100%);
    border-radius: 26px; border: 1px solid rgba(255,255,255,0.06); overflow: hidden;
  }
  .blob { position: absolute; border-radius: 50%; pointer-events: none; filter: blur(44px); }
  .blob.a { left: -90px; top: -110px; width: 420px; height: 420px; background: radial-gradient(circle, rgba(255,122,24,0.42) 0%, rgba(255,122,24,0) 68%); animation: gA 9s ease-in-out infinite; }
  .blob.b { right: -120px; bottom: -130px; width: 480px; height: 480px; background: radial-gradient(circle, rgba(168,85,247,0.40) 0%, rgba(168,85,247,0) 70%); animation: gB 11s ease-in-out infinite; }
  @keyframes gA { 0%,100%{ opacity:.5; transform:translate(0,0) scale(1);} 50%{ opacity:.85; transform:translate(0,-14px) scale(1.06);} }
  @keyframes gB { 0%,100%{ opacity:.4; transform:translate(0,0) scale(1);} 50%{ opacity:.7; transform:translate(0,16px) scale(1.08);} }

  .gauge { position: relative; width: 440px; height: 440px; flex: 0 0 440px; }
  .gauge svg { display: block; overflow: visible; }
  .labels { position: absolute; inset: 0; pointer-events: none; }
  .labels span { position: absolute; transform: translate(-50%,-50%); font-family: 'Rajdhani'; font-weight: 700; font-size: 22px; letter-spacing: .5px; color: #ffb86b; text-shadow: 0 0 14px rgba(255,140,40,0.9), 0 0 4px rgba(255,160,60,0.7); white-space: nowrap; }
  .center { position: absolute; left: 50%; top: 50%; transform: translate(-50%, calc(-50% - 40px)); text-align: center; pointer-events: none; width: 240px; }
  .center .num { font-family: 'Rajdhani'; font-weight: 700; font-size: 68px; line-height: .9; color: #fff; text-shadow: 0 0 24px rgba(168,85,247,0.6), 0 0 10px rgba(255,255,255,0.5); font-variant-numeric: tabular-nums; letter-spacing: -1px; }

  .panel { flex: 1; min-width: 0; position: relative; z-index: 2; }
  .eyebrow { font-family: 'Inter'; font-weight: 600; font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: #ff944d; margin-bottom: 18px; }
  .list { display: flex; flex-direction: column; gap: 11px; }
  .row { display: flex; align-items: center; gap: 15px; padding: 13px 16px; border-radius: 14px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07); transition: all 260ms cubic-bezier(0.25,0.1,0.25,1); }
  .row .badge { flex: 0 0 34px; width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: 'Rajdhani'; font-weight: 700; font-size: 17px; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.45); transition: all 260ms ease; }
  .row .txt { font-family: 'Inter'; font-weight: 600; font-size: 15px; color: rgba(255,255,255,0.6); transition: color 260ms ease; white-space: nowrap; }
  .row .track { margin-top: 8px; height: 2px; border-radius: 2px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .row .fill { height: 100%; width: 0%; border-radius: 2px; transition: width 360ms cubic-bezier(0.25,0.1,0.25,1); }
</style>
</head>
<body>
  <div id="stage">
    <div class="card">
      <div class="blob a"></div>
      <div class="blob b"></div>

      <div class="gauge">
        <svg viewBox="0 0 400 400" width="440" height="440">
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#ff7a18"></stop>
              <stop offset="0.28" stop-color="#ff4d6d"></stop>
              <stop offset="0.55" stop-color="#e0399e"></stop>
              <stop offset="0.8" stop-color="#a855f7"></stop>
              <stop offset="1" stop-color="#7c3aed"></stop>
            </linearGradient>
            <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="5" result="b"></feGaussianBlur>
              <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
            </filter>
            <filter id="nglow" x="-120%" y="-120%" width="340%" height="340%">
              <feGaussianBlur stdDeviation="2.6" result="nb"></feGaussianBlur>
              <feMerge><feMergeNode in="nb"></feMergeNode><feMergeNode in="nb"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
            </filter>
          </defs>

          <path id="track" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="14" stroke-linecap="round"></path>
          <g id="ticks" filter="url(#glow)"></g>
          <path id="progress" d="" fill="none" stroke="url(#grad)" stroke-width="11" stroke-linecap="round" filter="url(#glow)"></path>
          <g id="needle" filter="url(#nglow)">
            <polygon points="200,198.6 200,201.4 168,201 168,199" fill="#ff7a18" opacity="0.6"></polygon>
            <polygon points="200,194.6 200,205.4 348,200.7 348,199.3" fill="#ff8a2a"></polygon>
            <polygon points="200,196.3 200,203.7 312,200" fill="#fff4e2"></polygon>
          </g>
          <circle cx="200" cy="200" r="13" fill="#0c0814" stroke="rgba(255,255,255,0.25)" stroke-width="2"></circle>
          <circle cx="200" cy="200" r="4.5" fill="#ff7a18"></circle>
        </svg>

        <div class="labels" id="labels"></div>
        <div class="center"><div class="num" id="num">$0</div></div>
      </div>

      <div class="panel">
        <div class="eyebrow">Premium Business Bundle</div>
        <div class="list" id="list"></div>
      </div>
    </div>
  </div>

<script>
(function(){
  var CX=200, CY=200, R=150, START=135, SWEEP=270;
  var STOPS=['#ff7a18','#ff4d6d','#e0399e','#a855f7','#7c3aed'];
  var MONEY=[0,1000,5000,10000,25000,50000];
  var MLABELS=['$0','$1K','$5K','$10K','$25K','$50K'];
  var STAGES=[
    {n:'1', t:'Turnkey Online Store'},
    {n:'2', t:'$40 Ad Credit'},
    {n:'3', t:'Free Google Promo'},
    {n:'4', t:'7 AI Influencers'},
    {n:'5', t:'Personal Manager'}
  ];
  var PERIOD=5200;

  function polar(r,deg){ var a=deg*Math.PI/180; return [CX+r*Math.cos(a), CY+r*Math.sin(a)]; }
  function arc(r,s,e){ var p1=polar(r,s), p2=polar(r,e); var large=(e-s)<=180?0:1; return 'M '+p1[0].toFixed(2)+' '+p1[1].toFixed(2)+' A '+r+' '+r+' 0 '+large+' 1 '+p2[0].toFixed(2)+' '+p2[1].toFixed(2); }
  function h2(h){ h=h.replace('#',''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
  function lerp(a,b,t){ var pa=h2(a), pb=h2(b); var c=pa.map(function(v,i){return Math.round(v+(pb[i]-v)*t);}); return '#'+c.map(function(v){return v.toString(16).padStart(2,'0');}).join(''); }
  function ramp(f){ var s=STOPS; var x=Math.max(0,Math.min(1,f))*(s.length-1); var i=Math.floor(x); if(i>=s.length-1) return s[s.length-1]; return lerp(s[i],s[i+1],x-i); }
  function moneyAt(v){ var n=MONEY.length-1; var seg=Math.min(n-1,Math.floor(v*n)); var t=v*n-seg; return MONEY[seg]+(MONEY[seg+1]-MONEY[seg])*t; }
  function fmt(v){ var s = v>=1000 ? Math.round(v/1000)+'K' : ''+(Math.round(v/100)*100); return '$'+s; }

  var SVGNS='http://www.w3.org/2000/svg';
  // track
  document.getElementById('track').setAttribute('d', arc(R,START,START+SWEEP));
  // ticks
  var N=50, tg=document.getElementById('ticks');
  for(var i=0;i<=N;i++){
    var ang=START+i/N*SWEEP, major=i%10===0;
    var po=polar(R+4,ang), pi=polar(major?120:134,ang);
    var ln=document.createElementNS(SVGNS,'line');
    ln.setAttribute('x1',po[0].toFixed(2)); ln.setAttribute('y1',po[1].toFixed(2));
    ln.setAttribute('x2',pi[0].toFixed(2)); ln.setAttribute('y2',pi[1].toFixed(2));
    ln.setAttribute('stroke-width', major?3.4:1.8); ln.setAttribute('stroke-linecap','round');
    tg.appendChild(ln);
  }
  var ticks=tg.children;
  // labels
  var SC=440/400, lg=document.getElementById('labels');
  for(var k=0;k<=N;k+=10){
    var a2=START+k/N*SWEEP, p=polar(105,a2);
    var sp=document.createElement('span');
    sp.style.left=(p[0]*SC).toFixed(1)+'px'; sp.style.top=(p[1]*SC).toFixed(1)+'px';
    sp.textContent=MLABELS[k/10]; lg.appendChild(sp);
  }
  // list
  var lw=document.getElementById('list');
  STAGES.forEach(function(st,idx){
    var color=STOPS[idx];
    var row=document.createElement('div'); row.className='row'; row.dataset.color=color;
    var badge=document.createElement('div'); badge.className='badge'; badge.textContent=st.n;
    var mid=document.createElement('div'); mid.style.flex='1'; mid.style.minWidth='0';
    var txt=document.createElement('div'); txt.className='txt'; txt.textContent=st.t;
    var track=document.createElement('div'); track.className='track';
    var fill=document.createElement('div'); fill.className='fill';
    track.appendChild(fill); mid.appendChild(txt); mid.appendChild(track);
    row.appendChild(badge); row.appendChild(mid); lw.appendChild(row);
  });
  var rows=lw.children;

  function applyRow(el,on){
    var color=el.dataset.color;
    var badge=el.querySelector('.badge'), fill=el.querySelector('.fill'), txt=el.querySelector('.txt');
    if(on){
      el.style.background='rgba(255,255,255,0.05)'; el.style.borderColor=color;
      el.style.boxShadow='0 0 28px -4px '+color+', 0 0 9px -1px '+color; el.style.transform='translateX(5px)';
      badge.style.background=color; badge.style.color='#0a0710'; badge.style.boxShadow='0 0 18px '+color;
      fill.style.width='100%'; fill.style.background=color; fill.style.boxShadow='0 0 12px '+color;
      txt.style.color='#fff';
    } else {
      el.style.background='rgba(255,255,255,0.02)'; el.style.borderColor='rgba(255,255,255,0.07)';
      el.style.boxShadow='none'; el.style.transform='translateX(0)';
      badge.style.background='rgba(255,255,255,0.06)'; badge.style.color='rgba(255,255,255,0.45)'; badge.style.boxShadow='none';
      fill.style.width='0%'; txt.style.color='rgba(255,255,255,0.6)';
    }
  }

  var needle=document.getElementById('needle'), progress=document.getElementById('progress'), num=document.getElementById('num');
  var activeIdx=-1, t0=performance.now();

  function loop(now){
    var t=((now-t0)%PERIOD)/PERIOD;
    var ang, v, onScale, full;
    if(t<0.80){ onScale=true; full=false; v=t/0.80; ang=START+v*SWEEP; }
    else { onScale=false; var g=(t-0.80)/0.20; ang=START+SWEEP+g*90; full=g<0.5; v=full?1:0; }
    var inGap=!onScale;
    var dispV=onScale?v:(full?1:0);

    needle.setAttribute('transform','rotate('+ang.toFixed(2)+' 200 200)');
    needle.style.opacity=inGap?'0.2':'1';
    needle.style.filter=inGap?'none':'';

    var end=onScale?ang:(full?START+SWEEP:START+0.002*SWEEP);
    progress.setAttribute('d', arc(R,START,Math.max(end,START+0.002)));

    num.textContent=fmt(moneyAt(dispV));

    for(var i=0;i<ticks.length;i++){
      var frac=i/(ticks.length-1), major=i%10===0, lit=onScale?(frac<=v):full;
      if(lit){ ticks[i].style.stroke=ramp(frac); ticks[i].style.opacity='1'; }
      else { ticks[i].style.stroke=major?'rgba(255,210,170,0.45)':'rgba(255,255,255,0.15)'; ticks[i].style.opacity='0.8'; }
    }

    var ai=onScale?Math.min(4,Math.floor(v*5)):(full?4:0);
    if(ai!==activeIdx){ activeIdx=ai; for(var r=0;r<rows.length;r++) applyRow(rows[r], r===ai); }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // responsive: scale the 940x540 stage to fit the iframe/viewport
  var stage=document.getElementById('stage');
  function fit(){
    var s=Math.min(window.innerWidth/940, window.innerHeight/540);
    stage.style.transform='translate(-50%,-50%) scale('+s+')';
  }
  window.addEventListener('resize', fit); fit();
})();
</script>
</body>
</html>
